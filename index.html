<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seven Pens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@8..144,300..800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #0d0007;
      --bg-2: #21000f;
      --bg-3: #3a001c;
      --glow-a: rgba(255, 0, 94, 0.2);
      --glow-b: rgba(165, 28, 87, 0.16);
      --glow-c: rgba(255, 72, 136, 0.08);
      --shadow-a: rgba(0, 0, 0, 0.38);
      --text-main: #f6fbff;
      --text-link: #d6f5ff;
      --text-link-hover: #ffcf95;
      --text-label: rgba(228, 246, 255, 0.84);
      --toggle-bg: rgba(12, 3, 9, 0.72);
      --toggle-border: rgba(255, 255, 255, 0.22);
      --toggle-text: #f6fbff;
    }

    html,
    body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: "Google Sans Flex", "Segoe UI", sans-serif;
      overflow: hidden;
      background:
        radial-gradient(120vmax 90vmax at 12% 18%, var(--glow-a) 0%, transparent 55%),
        radial-gradient(90vmax 80vmax at 90% 85%, var(--glow-b) 0%, transparent 58%),
        radial-gradient(70vmax 60vmax at 48% 40%, var(--glow-c) 0%, transparent 60%),
        radial-gradient(130vmax 100vmax at 52% 62%, var(--shadow-a) 0%, transparent 62%),
        linear-gradient(130deg, var(--bg-1), var(--bg-2) 42%, var(--bg-3));
    }

    body[data-theme="light"] {
      --bg-1: #ffe7f1;
      --bg-2: #ffd7e8;
      --bg-3: #ffc5dd;
      --glow-a: rgba(255, 0, 94, 0.08);
      --glow-b: rgba(165, 28, 87, 0.07);
      --glow-c: rgba(255, 72, 136, 0.06);
      --shadow-a: rgba(123, 31, 75, 0.08);
      --text-main: #34111f;
      --text-link: #4b1a2b;
      --text-link-hover: #8f0036;
      --text-label: rgba(75, 26, 43, 0.82);
      --toggle-bg: rgba(255, 255, 255, 0.76);
      --toggle-border: rgba(82, 18, 42, 0.2);
      --toggle-text: #351120;
    }

    .layout {
      min-height: 100vh;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 3vw;
      padding: clamp(1.2rem, 3.2vw, 2.8rem);
    }

    .content {
      max-width: 660px;
      width: min(92%, 660px);
      justify-self: start;
      padding: clamp(1.2rem, 2.5vw, 2rem);
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 650;
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--text-main);
      margin-bottom: 0.8rem;
    }

    h1 span {
      color: #ff005e;
    }

    .nav,
    .tools {
      display: flex;
      gap: 0.6rem;
    }

    .nav {
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .tools {
      flex-direction: column;
      align-items: flex-start;
    }

    .nav a,
    .tools a {
      text-decoration: none;
      color: var(--text-link);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav a {
      font-size: 0.9rem;
    }

    .tools a {
      font-size: 0.73rem;
    }

    .nav a:hover,
    .tools a:hover {
      color: var(--text-link-hover);
    }

    .tools-title {
      margin-bottom: 0.75rem;
      color: var(--text-label);
      font-weight: 500;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .orb-wrap {
      width: 100%;
      min-height: 100%;
      display: grid;
      place-items: center;
      justify-self: end;
    }

    .stage {
      width: min(74vmin, 600px);
      aspect-ratio: 1;
      position: relative;
      display: grid;
      place-items: center;
    }

    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      inset: -12%;
      border-radius: 50%;
      pointer-events: none;
    }

    .stage::before {
      background: radial-gradient(circle, rgba(94, 173, 255, 0.4) 0%, rgba(94, 173, 255, 0) 66%);
      filter: blur(28px);
      opacity: 0.65;
    }

    .stage::after {
      background: radial-gradient(circle, rgba(255, 177, 89, 0.2) 0%, rgba(255, 177, 89, 0) 72%);
      transform: scale(1.08);
      filter: blur(30px);
    }

    .hero-mark {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 36px 64px rgba(0, 0, 0, 0.28));
    }

    .theme-toggle {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      z-index: 10;
      border: 1px solid var(--toggle-border);
      background: var(--toggle-bg);
      color: var(--toggle-text);
      padding: 0.48rem 0.72rem;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }

    @media (max-width: 700px) {
      .layout {
        grid-template-columns: 1fr;
        gap: 1.2rem;
        padding: 1rem;
      }

      .orb-wrap {
        order: -1;
      }

      .content {
        width: 100%;
      }

      .stage {
        width: min(82vmin, 460px);
      }

      .hero-mark {
        filter: drop-shadow(0 28px 48px rgba(0, 0, 0, 0.28));
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <section class="content" aria-label="Seven Pens links">
      <h1>Seven<span>Pens</span></h1>

      <nav class="nav" aria-label="Primary links">
        <a href="https://docs.sevenpens.com" target="_blank" rel="noopener noreferrer">Docs</a>
        <a href="https://www.youtube.com/@sevenpens" target="_blank" rel="noopener noreferrer">YouTube</a>
        <a href="https://x.com/TheSevenPens" target="_blank" rel="noopener noreferrer">X</a>
      </nav>

      <p class="tools-title">Tools</p>
      <div class="tools" aria-label="Tool links">
        <a href="https://thesevenpens.github.io/WebPressureExplorer/" target="_blank" rel="noopener noreferrer">Pressure Explorer</a>
        <a href="https://thesevenpens.github.io/WebTabletTesterBasic/" target="_blank" rel="noopener noreferrer">Tablet Tester Basic (new)</a>
        <a href="https://thesevenpens.github.io/WebTabletTester/" target="_blank" rel="noopener noreferrer">Tablet Tester Advanced (new)</a>
        <a href="https://thesevenpens.github.io/HtmlTabletTester/" target="_blank" rel="noopener noreferrer">Tablet Tester (original)</a>
        <a href="https://thesevenpens.github.io/DrawTabInventory/" target="_blank" rel="noopener noreferrer">My Drawing Tablet Inventory</a>
        <a href="https://thesevenpens.github.io/DrawTabPenCompat/" target="_blank" rel="noopener noreferrer">Wacom Pen Compatibility</a>
        <a href="https://thesevenpens.github.io/Wacom-Driver-List/" target="_blank" rel="noopener noreferrer">Wacom Driver List</a>
        <a href="https://thesevenpens.github.io/PenPressureData/" target="_blank" rel="noopener noreferrer">Pen Pressure Response Dataset</a>
      </div>
    </section>

    <main class="orb-wrap" aria-label="Seven Pens mark">
      <div class="stage">
        <img class="hero-mark" src="7P-Logo-Core.svg" alt="Seven Pens logo mark">
      </div>
    </main>
  </div>
  <button class="theme-toggle" type="button" aria-label="Toggle light and dark mode">Light Mode</button>
  <script>
    const storageKey = 'sevenpens-theme';
    const button = document.querySelector('.theme-toggle');
    const bodyEl = document.body;

    const applyTheme = (theme) => {
      bodyEl.setAttribute('data-theme', theme);
      if (button) {
        button.textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
      }
    };

    const savedTheme = localStorage.getItem(storageKey);
    const initialTheme = savedTheme === 'light' ? 'light' : 'dark';
    applyTheme(initialTheme);

    if (button) {
      button.addEventListener('click', () => {
        const nextTheme = bodyEl.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        applyTheme(nextTheme);
        localStorage.setItem(storageKey, nextTheme);
      });
    }
  </script>
</body>
</html>
