<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seven Pens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@8..144,300..800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-1: #220012;
      --bg-2: #3a001e;
      --bg-3: #55112f;
    }

    html,
    body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: "Google Sans Flex", "Segoe UI", sans-serif;
      overflow: hidden;
      background:
        radial-gradient(120vmax 90vmax at 12% 18%, rgba(255, 0, 94, 0.24) 0%, transparent 55%),
        radial-gradient(90vmax 80vmax at 90% 85%, rgba(165, 28, 87, 0.2) 0%, transparent 58%),
        radial-gradient(70vmax 60vmax at 48% 40%, rgba(255, 72, 136, 0.1) 0%, transparent 60%),
        linear-gradient(130deg, var(--bg-1), var(--bg-2) 42%, var(--bg-3));
    }

    .layout {
      min-height: 100vh;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 3vw;
      padding: clamp(1.2rem, 3.2vw, 2.8rem);
    }

    .content {
      max-width: 660px;
      width: min(92%, 660px);
      justify-self: start;
      padding: clamp(1.2rem, 2.5vw, 2rem);
      background: transparent;
    }

    h1 {
      font-family: inherit;
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 650;
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: #f6fbff;
      margin-bottom: 0.8rem;
    }

    h1 span {
      color: #ff005e;
    }

    .nav,
    .tools {
      display: flex;
      gap: 0.6rem;
    }

    .nav {
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .tools {
      flex-direction: column;
      align-items: flex-start;
    }

    .nav a,
    .tools a {
      text-decoration: none;
      color: #d6f5ff;
      padding: 0;
      font-family: inherit;
      font-size: 0.73rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: transform 0.24s ease, color 0.24s ease;
    }

    .nav a:hover,
    .tools a:hover {
      transform: translateY(-2px);
      color: #ffcf95;
    }

    .tools-title {
      margin-bottom: 0.75rem;
      color: rgba(228, 246, 255, 0.84);
      font-family: inherit;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-size: 0.68rem;
    }

    .orb-wrap {
      width: 100%;
      min-height: 100%;
      display: grid;
      place-items: center;
      justify-self: end;
    }

    .stage {
      width: min(74vmin, 600px);
      aspect-ratio: 1;
      position: relative;
      display: grid;
      place-items: center;
    }

    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      inset: -12%;
      border-radius: 50%;
      pointer-events: none;
    }

    .stage::before {
      background: radial-gradient(circle, rgba(94, 173, 255, 0.4) 0%, rgba(94, 173, 255, 0) 66%);
      filter: blur(28px);
      opacity: 0.65;
    }

    .stage::after {
      background: radial-gradient(circle, rgba(255, 177, 89, 0.2) 0%, rgba(255, 177, 89, 0) 72%);
      transform: scale(1.08);
      filter: blur(30px);
    }

    .hero-mark {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 36px 64px rgba(0, 0, 0, 0.28));
    }

    @media (max-width: 700px) {
      .layout {
        grid-template-columns: 1fr;
        gap: 1.2rem;
        padding: 1rem;
      }

      .orb-wrap {
        order: -1;
      }

      .content {
        width: 100%;
      }

      .stage {
        width: min(82vmin, 460px);
      }

      .hero-mark {
        filter: drop-shadow(0 28px 48px rgba(0, 0, 0, 0.28));
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <section class="content" aria-label="Seven Pens links">
      <h1>Seven<span>Pens</span></h1>

      <nav class="nav" aria-label="Primary links">
        <a href="https://docs.sevenpens.com" target="_blank" rel="noopener noreferrer">Docs</a>
        <a href="https://www.youtube.com/@sevenpens" target="_blank" rel="noopener noreferrer">YouTube</a>
        <a href="https://x.com/TheSevenPens" target="_blank" rel="noopener noreferrer">X</a>
      </nav>

      <p class="tools-title">Tools</p>
      <div class="tools" aria-label="Tool links">
        <a href="https://thesevenpens.github.io/WebPressureExplorer/" target="_blank" rel="noopener noreferrer">Pressure Explorer</a>
        <a href="https://thesevenpens.github.io/WebTabletTesterBasic/" target="_blank" rel="noopener noreferrer">Tablet Tester Basic (new)</a>
        <a href="https://thesevenpens.github.io/WebTabletTester/" target="_blank" rel="noopener noreferrer">Tablet Tester Advanced (new)</a>
        <a href="https://thesevenpens.github.io/HtmlTabletTester/" target="_blank" rel="noopener noreferrer">Tablet Tester (original)</a>
        <a href="https://thesevenpens.github.io/DrawTabInventory/" target="_blank" rel="noopener noreferrer">My Drawing Tablet Inventory</a>
        <a href="https://thesevenpens.github.io/DrawTabPenCompat/" target="_blank" rel="noopener noreferrer">Wacom Pen Compatibility</a>
        <a href="https://thesevenpens.github.io/Wacom-Driver-List/" target="_blank" rel="noopener noreferrer">Wacom Driver List</a>
        <a href="https://thesevenpens.github.io/PenPressureData/" target="_blank" rel="noopener noreferrer">Pen Pressure Response Dataset</a>
      </div>
    </section>

    <main class="orb-wrap" aria-label="Seven Pens mark">
      <div class="stage">
        <img class="hero-mark" src="7P-Logo-Core.svg" alt="Seven Pens logo mark">
      </div>
    </main>
  </div>
</body>
</html>
