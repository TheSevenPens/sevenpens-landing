<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seven Pens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #1a1a18; --paper: #f5f2eb; --muted: #9a9488; --accent: #c8622a; }
    html, body { height: 100%; }
    body { background: var(--paper); color: var(--ink); font-family: 'Inconsolata', monospace; font-weight: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; position: relative; overflow: hidden; }
    body::after { content: ''; position: fixed; left: 0; right: 0; top: 50%; height: 1px; background: var(--muted); opacity: 0.15; pointer-events: none; z-index: 0; }
    main { position: relative; z-index: 1; text-align: center; animation: fadeIn 1.2s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .wordmark { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(3rem, 10vw, 6rem); letter-spacing: -0.02em; line-height: 1; margin-bottom: 0.5rem; }
    .wordmark span { color: var(--accent); }
    .tagline { font-family: 'Inconsolata', monospace; font-weight: 300; font-size: clamp(0.7rem, 2vw, 0.85rem); letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 3.5rem; }
    .divider { width: 1px; height: 2rem; background: var(--muted); opacity: 0.4; margin: 0 auto 3.5rem; }
    nav { display: flex; align-items: center; gap: 2.5rem; justify-content: center; flex-wrap: wrap; }
    nav a { font-family: 'Inconsolata', monospace; font-size: 0.78rem; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink); text-decoration: none; position: relative; padding-bottom: 2px; transition: color 0.2s ease; }
    nav a::after { content: ''; position: absolute; left: 0; bottom: 0; width: 0; height: 1px; background: var(--accent); transition: width 0.3s ease; }
    nav a:hover { color: var(--accent); }
    nav a:hover::after { width: 100%; }
    .nav-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); opacity: 0.5; }
    footer { position: fixed; bottom: 2rem; left: 0; right: 0; text-align: center; font-size: 0.65rem; letter-spacing: 0.15em; color: var(--muted); opacity: 0.6; z-index: 1; }
  </style>
</head>
<body>
  <main>
    <h1 class="wordmark">Seven<span>Pens</span></h1>
    <p class="tagline">Exploring Creative Technology</p>
    <div class="divider"></div>
    <nav>
      <a href="https://docs.sevenpens.com" target="_blank">Docs</a>
      <span class="nav-dot"></span>
      <a href="https://www.youtube.com/@thesevenpens" target="_blank">YouTube</a>
      <span class="nav-dot"></span>
      <a href="https://x.com/TheSevenPens" target="_blank">X</a>
    </nav>
  </main>
  <footer>sevenpens.com</footer>
</body>
</html>
